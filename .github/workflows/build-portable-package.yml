name: Build Release Packages

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: 包版本标签，默认使用 tag 名或 dev-<sha>
        required: false
        type: string
      artifact_name:
        description: Artifact 名称，默认 kam-portable-<version>
        required: false
        type: string
  push:
    tags:
      - "v*"

jobs:
  build-portable-package:
    runs-on: windows-latest
    env:
      INPUT_VERSION: ${{ github.event.inputs.version || '' }}
      INPUT_ARTIFACT_NAME: ${{ github.event.inputs.artifact_name || '' }}
      PORTABLE_OUTPUT_DIR: output\package-artifacts\portable
      WINDOWS_OUTPUT_DIR: output\package-artifacts\windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install backend dependencies
        shell: pwsh
        run: python -m pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: app
        shell: pwsh
        run: npm ci

      - name: Build frontend
        working-directory: app
        shell: pwsh
        run: npm run build

      - name: Resolve package metadata
        id: meta
        shell: pwsh
        run: |
          $version = $env:INPUT_VERSION
          if ([string]::IsNullOrWhiteSpace($version)) {
            if ($env:GITHUB_REF_TYPE -eq "tag") {
              $version = $env:GITHUB_REF_NAME
            }
            else {
              $version = "dev-$($env:GITHUB_SHA.Substring(0, 7))"
            }
          }

          $artifactName = $env:INPUT_ARTIFACT_NAME
          if ([string]::IsNullOrWhiteSpace($artifactName)) {
            $artifactName = "kam-portable-$version"
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "artifact_name=$artifactName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Package portable bundle
        shell: pwsh
        run: |
          ./scripts/package-portable.ps1 -Version '${{ steps.meta.outputs.version }}' -OutputDir "$env:PORTABLE_OUTPUT_DIR"

      - name: Build Windows executable release
        shell: pwsh
        run: |
          ./scripts/build-windows-release.ps1 -Version '${{ steps.meta.outputs.version }}' -OutputDir "$env:WINDOWS_OUTPUT_DIR"

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: ${{ env.PORTABLE_OUTPUT_DIR }}\*.zip
          if-no-files-found: error

      - name: Upload Windows executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: kam-windows-exe-${{ steps.meta.outputs.version }}
          path: ${{ env.WINDOWS_OUTPUT_DIR }}\*.zip
          if-no-files-found: error

      - name: Publish release assets
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          $repo = $env:GITHUB_REPOSITORY
          $tag = $env:GITHUB_REF_NAME
          $releaseEndpoint = "https://api.github.com/repos/$repo/releases"
          $lookupResponse = Invoke-RestMethod -Method Get -Headers $headers -Uri "$releaseEndpoint/tags/$tag" -StatusCodeVariable lookupStatus -SkipHttpErrorCheck
          if ($lookupStatus -eq 404) {
            $payload = @{
              tag_name = $tag
              name = "KAM $tag"
              prerelease = ($tag -match "(?i)(alpha|beta|rc)")
              generate_release_notes = $true
            } | ConvertTo-Json
            $release = Invoke-RestMethod -Method Post -Headers $headers -Uri $releaseEndpoint -Body $payload
          }
          elseif ($lookupStatus -ge 200 -and $lookupStatus -lt 300) {
            $release = $lookupResponse
          }
          else {
            throw "查询 Release 失败，HTTP $lookupStatus"
          }

          $assets = @()
          $assets += Get-ChildItem -Path $env:PORTABLE_OUTPUT_DIR -Filter *.zip
          $assets += Get-ChildItem -Path $env:WINDOWS_OUTPUT_DIR -Filter *.zip

          $existingAssets = Invoke-RestMethod -Method Get -Headers $headers -Uri $release.assets_url
          foreach ($assetFile in $assets) {
            foreach ($existingAsset in @($existingAssets)) {
              if ($existingAsset.name -eq $assetFile.Name) {
                Invoke-RestMethod -Method Delete -Headers $headers -Uri "https://api.github.com/repos/$repo/releases/assets/$($existingAsset.id)"
              }
            }

            $uploadUrl = ($release.upload_url -replace "\{\?name,label\}$", "")
            $escapedName = [uri]::EscapeDataString($assetFile.Name)
            $uploadHeaders = @{
              Authorization = "Bearer $env:GITHUB_TOKEN"
              Accept = "application/vnd.github+json"
              "Content-Type" = "application/zip"
            }
            Invoke-RestMethod -Method Post -Headers $uploadHeaders -Uri "$uploadUrl?name=$escapedName" -InFile $assetFile.FullName
          }
