services:
  kam:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:///./storage/kam-v3.db}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000,http://localhost:5173,http://127.0.0.1:5173}
      CODEX_PATH: ${CODEX_PATH:-codex}
      CLAUDE_CODE_PATH: ${CLAUDE_CODE_PATH:-claude}
    volumes:
      - storage:/workspace/backend/storage
    restart: unless-stopped

volumes:
  storage:
