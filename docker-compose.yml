services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/kam_lite}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-http://localhost:8000,http://localhost,http://localhost:5173}
      AGENT_WORKROOT: ${AGENT_WORKROOT:-./storage/agent-runs}
      CODEX_CLI_PATH: ${CODEX_CLI_PATH:-codex}
      CLAUDE_CODE_CLI_PATH: ${CLAUDE_CODE_CLI_PATH:-claude}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - storage:/app/storage
    networks:
      - kam-lite
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kam_lite
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - kam-lite
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kam_lite"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  storage:

networks:
  kam-lite:
    driver: bridge
